[tool.black]
line-length = 100
target-version = ["py311"]

[tool.ruff]
line-length = 100
target-version = "py311"
fix = true
exclude = [
    ".agent",
    ".venv",
    "dist",
    "build"
]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "SIM", "RUF"]
ignore = ["E501"]  # black cuida do line length

[tool.ruff.lint.isort]
known-first-party = ["app"]
